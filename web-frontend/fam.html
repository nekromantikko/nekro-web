<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Synthesizer Piece</title>
</head>
<body>
    <div id="synth-root"></div>
    <div>
        <h3>Pulse 1 Controls</h3>
        
        <label>Volume: </label>
        <input type="range" id="pulse1-vol" min="0" max="15" value="8">

        <label>Duty Cycle: </label>
        <button onclick="setDuty(0x00)">12.5%</button>
        <button onclick="setDuty(0x40)">25%</button>
        <button onclick="setDuty(0x80)">50%</button>
        <button onclick="setDuty(0xC0)">25% Negated</button>
    </div>
    <script type="module" src="./src/fam/fam-main.ts"></script>
</body>
</html>
